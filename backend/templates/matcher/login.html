{% extends 'matcher/base.html' %}
{% block content %}
<section class="narrow-page">
  <article class="glass-card form-card">
    <h1>Welcome Back</h1>
    <p class="muted">Log in to continue matching your resume with top roles.</p>

    <form id="login-form" class="form-stack">
      <label>Email</label>
      <input class="soft-input" id="login-email" type="email" required />
      <label>Password</label>
      <input class="soft-input" id="login-password" type="password" required />
      <p id="login-error" class="error hidden"></p>
      <button class="cta-btn" type="submit" id="login-submit">Login</button>
    </form>

    <p class="muted center">Create an account? <a href="/signup">Sign up</a></p>
  </article>
</section>
{% endblock %}
